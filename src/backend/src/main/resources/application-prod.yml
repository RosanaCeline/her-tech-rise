app:
  frontend-url: ${FRONTEND_URL}
server:
  port: 8080
email:
  subject: "Default Subject"
  message: "Default Message"
security:
  jwt:
    token:
      secret-key: ${HER_TECH_SECURITY_JWT_KEY}
      expire-length: 3600000
spring:
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  mvc:
    locale: pt_BR
    charset: UTF-8
  jackson:
    time-zone: America/Sao_Paulo
  messages:
    encoding: UTF-8
  application:
    name: Her Tech Rise API
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${HER_TECH_DATABASE_URL}         # variável diferente para o banco em produção
    username: ${HER_TECH_DATABASE_USERNAME}
    password: ${HER_TECH_DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate.jdbc.time_zone: America/Sao_Paulo
    show-sql: false
    open-in-view: false
  flyway:
    baseline-on-migrate: true
logging:
  level:
    root: WARN
brevo:
  api-key: ${BREVO_API_KEY}
  sender-email: ${BREVO_SENDER_EMAIL}
  sender-name: Her Tech Rise